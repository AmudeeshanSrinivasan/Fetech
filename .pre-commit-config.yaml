repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff
        entry: uv run --no-sync ruff check .
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run --no-sync mypy src/fetech
        language: system
        pass_filenames: false
      - id: v01-conformance
        name: v0.1 capability conformance
        entry: uv run --no-sync pytest tests/test_v01_conformance.py -q
        language: system
        pass_filenames: false
