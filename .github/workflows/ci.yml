name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FETECH_WORKER_ISOLATION_MODE: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Install all capability extras
        run: uv sync --frozen --all-extras
      - name: Install Chromium for browser conformance
        run: uv run --no-sync playwright install --with-deps chromium
      - name: Lint
        run: uv run --no-sync ruff check .
      - name: Type check
        run: uv run --no-sync mypy src/fetech
      - name: Test
        run: uv run --no-sync coverage run -m pytest -q -m "not linux_containment"
      - name: Coverage report
        run: uv run --no-sync coverage report -m
      - name: Verify release evidence
        run: |
          uv run --no-sync python scripts/generate_release_evidence.py --check-published
          uv run --no-sync python scripts/check_v04_release_readiness.py --check
          uv run --no-sync python scripts/generate_release_evidence.py \
            --overlay-profile scripts/release_v04_candidate.toml --check
      - name: Build and verify candidate distributions
        run: |
          uv build
          (cd dist && sha256sum \
            fetech-0.4.0a0-py3-none-any.whl \
            fetech-0.4.0a0.tar.gz > SHA256SUMS)
          uv run --no-sync python scripts/verify_v04_release_artifacts.py \
            --wheel dist/fetech-0.4.0a0-py3-none-any.whl \
            --sdist dist/fetech-0.4.0a0.tar.gz \
            --checksums dist/SHA256SUMS

  containment-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv and containment dependencies
        run: |
          python -m pip install uv
          sudo apt-get update
          sudo apt-get install --yes apparmor-profiles bubblewrap libseccomp2
      - name: Enable reviewed Bubblewrap AppArmor profile
        run: |
          test -r /usr/share/apparmor/extra-profiles/bwrap-userns-restrict
          sudo install \
            --mode=0644 \
            /usr/share/apparmor/extra-profiles/bwrap-userns-restrict \
            /etc/apparmor.d/bwrap-userns-restrict
          sudo apparmor_parser \
            --replace \
            /etc/apparmor.d/bwrap-userns-restrict
      - name: Install test environment
        run: uv sync --frozen --all-extras
      - name: Install reviewed Chromium test bundle
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
        run: uv run --no-sync playwright install --with-deps chromium
      - name: Verify containment tools
        run: |
          /usr/bin/bwrap --version
          systemd-run --version
          test -r /sys/fs/cgroup/cgroup.controllers
          /usr/bin/bwrap \
            --unshare-user \
            --unshare-pid \
            --unshare-ipc \
            --unshare-uts \
            --unshare-cgroup \
            --unshare-net \
            --disable-userns \
            --die-with-parent \
            --new-session \
            --cap-drop ALL \
            --uid "$(id -u)" \
            --gid "$(id -g)" \
            --ro-bind /usr /usr \
            --symlink usr/bin /bin \
            --symlink usr/sbin /sbin \
            --symlink usr/lib /lib \
            --symlink usr/lib64 /lib64 \
            --proc /proc \
            --dev /dev \
            -- /usr/bin/true
      - name: Run required Linux containment enforcement
        run: |
          sudo systemd-run \
            --unit=fetech-containment-ci \
            --service-type=exec \
            --wait \
            --pipe \
            --collect \
            --working-directory="$GITHUB_WORKSPACE" \
            --property="User=$USER" \
            --property="Group=$(id -gn)" \
            --property="Delegate=cpu memory pids" \
            --property="DelegateSubgroup=daemon" \
            --property="NoNewPrivileges=yes" \
            --setenv="FETECH_WORKER_ISOLATION_MODE=required" \
            --setenv="FETECH_WORKER_BWRAP_EXECUTABLE=/usr/bin/bwrap" \
            --setenv="FETECH_WORKER_CGROUP_ROOT=/sys/fs/cgroup/system.slice/fetech-containment-ci.service" \
            --setenv="FETECH_BROWSER_ARTIFACTS_PATH=$GITHUB_WORKSPACE/.playwright-browsers" \
            "$GITHUB_WORKSPACE/.venv/bin/pytest" -q -m linux_containment
