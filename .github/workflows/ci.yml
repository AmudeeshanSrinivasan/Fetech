name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Install all capability extras
        run: uv sync --frozen --all-extras
      - name: Lint
        run: uv run --no-sync ruff check .
      - name: Type check
        run: uv run --no-sync mypy src/fetech
      - name: Test
        run: uv run --no-sync coverage run -m pytest -q
      - name: Coverage report
        run: uv run --no-sync coverage report -m
      - name: Build distributions
        run: uv build
